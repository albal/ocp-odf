name: Validate Kubernetes YAML

on:
  push:
    paths:
      - '**.yaml'
      - '**.yml'
  pull_request:
    paths:
      - '**.yaml'
      - '**.yml'

jobs:
  yamllint:
    name: Lint YAML files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: '.'
          config_data: |
            extends: default
            rules:
              line-length:
                max: 150
              comments:
                min-spaces-from-content: 1

  kubeconform:
    name: Validate Kubernetes objects
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          sudo tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform

      - name: Validate YAML files against Kubernetes schemas
        run: |
          find . -name '*.yaml' -o -name '*.yml' | \
            grep -v '.github/' | \
            xargs -r kubeconform \
              -ignore-missing-schemas \
              -strict \
              -summary
